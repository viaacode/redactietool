# Docker compose file for development environment.
# docker compose -f docker-compose.develop.yml up
#
# Mounts local source into the container and uses Flask's dev server
# so templates, static files and Python code reload on save.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./wsgi.py:/app/wsgi.py
      - ./debug.py:/app/debug.py
      - subtitle_uploads:/app/app/subtitle_uploads
    environment:
      - FLASK_ENV=DEVELOPMENT
    entrypoint: ["python", "debug.py"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15.17
    env_file:
      - .env
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  subtitle_uploads:
  postgres-data:

networks:
  app-network:
