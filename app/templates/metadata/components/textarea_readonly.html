{%- macro textarea_readonly(label, name, value) %}
 <article class="panel">
    <p class="panel-heading">
    {{label}}
    </p>
    <div class="panel-block" style="padding: 0">
      <p class="control">
      <textarea
          name="{{name}}"
          id="{{name}}"
          class="textarea is-hover" 
          placeholder="{{label}}"
          style="height:30vh"
					readonly>{{value}}</textarea>
      </p>

    </div>
 </article>
{%- endmacro %}
