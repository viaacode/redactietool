<div class="ai-language-controls is-inline-flex  is-justify-content-center">
  <div class="column is-flex is-justify-content-end">
    <div class="select">
      <select id="ai_language_select">
        <option value="nl">Nederlands</option>
        <option value="fr">Frans</option>
        <option value="en">Engels</option>
        <option value="de">Duits</option>
        <option value="es">Spaans</option>
        <option value="it">Italiaans</option>
        <option value="pt">Portugees</option>
        <option value="ar">Arabisch</option>
        <option value="zh">Chinees</option>
        <option value="ru">Russisch</option>
      </select>
    </div>
  </div>
  <div class="column pr-0">
    <button class="button is-info{% if sm_job_status == 'running' %} is-loading{% endif %}"
            id="request_ai_content_btn"
            {% if sm_job_status == 'running' %}disabled{% endif %}>
      <ion-icon name="cloud-upload-outline" class="pr-2"></ion-icon>
      AI inhoud opvragen
    </button>
  </div>
</div>

<script>
  (function () {
    var btn = document.getElementById('request_ai_content_btn');
    if (!btn) return;

    var statusBadgeClasses = {
      'running':  'is-warning',
      'done':     'is-success',
      'rejected': 'is-danger',
      'deleted':  'is-dark',
      'expired':  'is-light'
    };
    var statusBadgeLabels = {
      'running':  'verwerken',
      'done':     'gegenereerd',
      'rejected': 'mislukt',
      'deleted':  'verwijderd',
      'expired':  'verlopen'
    };

    function updateBadge(status) {
      var badge = document.getElementById('sm_status_badge');
      if (!badge) return;
      Object.values(statusBadgeClasses).forEach(function(cls) { badge.classList.remove(cls); });
      badge.classList.add(statusBadgeClasses[status] || 'is-light');
      badge.textContent = statusBadgeLabels[status] || status;
    }

    function setButtonRunning() {
      btn.classList.add('is-loading');
      btn.disabled = true;
    }

    function setButtonReady() {
      btn.classList.remove('is-loading');
      btn.disabled = false;
    }

    function showError(message, details) {
      var el = document.getElementById('ai_status_error');
      if (!el) return;
      el.textContent = message;
      if (details && details.length > 0) {
        var small = document.createElement('small');
        small.style.display = 'block';
        small.style.marginTop = '0.25rem';
        small.textContent = details.join(' ');
        el.appendChild(small);
      }
      el.style.display = '';
      var sectionEl = document.getElementById('ai_section_status_error');
      if (sectionEl) sectionEl.style.display = '';
    }

    function hideError() {
      var el = document.getElementById('ai_status_error');
      if (el) el.style.display = 'none';
      var sectionEl = document.getElementById('ai_section_status_error');
      if (sectionEl) sectionEl.style.display = 'none';
    }

    var pollingInterval = null;

    function startPolling() {
      if (pollingInterval) return;
      pollingInterval = setInterval(function () {
        fetch('/{{ department }}/{{ pid }}/speechmatic/status')
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var status = data.status;
            updateBadge(status);
            if (status === 'done') {
              clearInterval(pollingInterval);
              pollingInterval = null;
              window.location.reload();
            } else if (status === 'running') {
              // keep polling
            } else {
              clearInterval(pollingInterval);
              pollingInterval = null;
              setButtonReady();
              if (status === 'rejected' || status === 'deleted') {
                showError('De aanvraag voor AI inhoud is mislukt. Je kan een nieuwe aanvraag indienen.', data.errors);
              } else if (status === 'expired') {
                showError('De aanvraag voor AI inhoud is verlopen. Je kan een nieuwe aanvraag indienen.', data.errors);
              }
            }
          })
          .catch(function () { /* keep polling on network error */ });
      }, 30000);
    }

    function showAiToast(colorClass, message) {
      var container = document.getElementById('ai_toast_container');
      if (!container) return;
      container.innerHTML =
        '<div class="notification ' + colorClass + ' fadein">' +
        '<button class="delete" onclick="this.parentNode.remove()"></button>' +
        message +
        '</div>';
      setTimeout(function () {
        var el = container.firstChild;
        if (el) {
          el.classList.replace('fadein', 'fadeout');
          setTimeout(function () { container.innerHTML = ''; }, 600);
        }
      }, 5000);
    }

    btn.addEventListener('click', function () {
      var language = document.getElementById('ai_language_select').value;
      setButtonRunning();
      hideError();

      fetch('/speechmatic/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          department: '{{ department }}',
          pid: '{{ pid }}',
          language: language
        })
      })
      .then(function (response) {
        return response.json().then(function (data) {
          return { ok: response.ok, data: data };
        });
      })
      .then(function (result) {
        if (result.ok) {
          showAiToast('is-success', 'Aanvraag ingediend. De AI inhoud wordt verwerkt.');
          updateBadge('running');
          startPolling();
        } else {
          setButtonReady();
          showAiToast('is-danger', result.data.error || 'Er is een fout opgetreden.');
        }
      })
      .catch(function () {
        setButtonReady();
        showAiToast('is-danger', 'Netwerkfout: de aanvraag kon niet worden verzonden.');
      });
    });

    // Auto-start polling if job is already running on page load
    {% if sm_job_status == 'running' %}
    startPolling();
    {% endif %}
  })();
</script>
